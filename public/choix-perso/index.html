<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choix de Personnage</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  
    <div id="character-selection" class="screen">
        <button id="back-button">
            <img src="/assets/img/fond/retour.png" alt="Bouton retour">
        </button>
        <div class="selection-container">
            <!-- Grille des personnages -->
            <div class="character-container">
                <div class="character-grid">
                    <div class="character-cell selected"></div>
                    <div class="character-cell"></div>
                    <div class="character-cell"></div>
                    <div class="character-cell"></div>
                    <div class="character-cell"></div>
                    <div class="character-cell"></div>
                    <div class="character-cell"></div>
                    <div class="character-cell"></div>
                    <div class="character-cell"></div>
                    <div class="character-cell"></div>
                    <div class="character-cell"></div>
                    <div class="character-cell"></div>
                </div>            </div>
            
            <div class="personnage-changer">
                <img src="/assets/img/fond/foudubus.png" alt="avatar personnage fou du bus">
                <img src="/assets/img/fond/blaze2.png" alt="Nom du personnage">
            </div>
        </div>
        
        <!-- Ajout de la classe "suivant-container" pour un meilleur placement -->
        <div class="suivant-container">
            <button class="suivant">
                <img src="/assets/img/fond/bouton-suivant.png" alt="Bouton suivant">
            </button>
        </div>
    </div>

    <script src="/assets/js/choix-perso.js"></script>
</body>
</html>
