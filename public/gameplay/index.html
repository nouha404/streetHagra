<!DOCTYPE html>
<html lang="fr">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<head>
    <meta charset="UTF-8">
    <title>Gameplay - Street Hagra</title>
    <link rel="stylesheet" href="/assets/css/gameplay.css">
    <script src="/socket.io/socket.io.js"></script>
    <script defer src="/assets/js/gameplay.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="player1-health" class="health-bar-container">
            <div class="player-name player1-status"></div>
            <div class="status-bars">
                <div class="bar-group">
                    <div class="bar-label">HP</div>
                    <div class="health-bar"></div>
                </div>
                <div class="bar-group">
                    <div class="bar-label">MANA</div>
                    <div class="mana-bar"></div>
                </div>
            </div>
        </div>
        <div id="player2-health" class="health-bar-container">
            <div class="player-name player2-status"></div>
            <div class="status-bars">
                <div class="bar-group">
                    <div class="bar-label">HP</div>
                    <div class="health-bar"></div>
                </div>
                <div class="bar-group">
                    <div class="bar-label">MANA</div>
                    <div class="mana-bar"></div>
                </div>
            </div>
        </div>
        <div id="game-background"></div>
        <div id="player1" class="player"></div>
        <div id="player2" class="player"></div>
    </div>
</body>
</html>
